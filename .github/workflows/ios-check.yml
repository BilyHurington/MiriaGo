name: iOS Build Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Build iOS debug app without signing
        run: flutter build ios --debug --no-codesign --no-pub
