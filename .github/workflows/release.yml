name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Restore keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p android/app
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/miriago-release.jks
            {
              printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
              printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
              printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
              printf 'storeFile=miriago-release.jks\n'
            } > android/key.properties
          fi

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "MiriaGo-${GITHUB_REF_NAME:-manual}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: miriago-apk
          path: MiriaGo-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MiriaGo-${{ github.ref_name }}.apk
          generate_release_notes: true
